<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="PaySentry — Payment Control Plane for AI Agents">

    <meta property="og:url" content="https://mkyang.ai/paysentry">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate" type="text/markdown" href="/paysentry/llms-full.txt" title="LLM-readable full API reference">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: monospace; background: #0d1117; color: #c9d1d9; max-width: 80ch; margin: 0 auto; padding: 2rem 1.5rem; font-size: 14px; line-height: 1.6; }
        #md a { color: #58a6ff; }
        #md h1 { color: #f0f6fc; font-size: 1.4em; border-bottom: 1px solid #21262d; padding-bottom: .3em; }
        #md h2 { color: #f0f6fc; font-size: 1.1em; margin-top: 2em; border-bottom: 1px solid #21262d; padding-bottom: .3em; }
        #md h3 { color: #f0f6fc; font-size: 1em; }
        #md pre { background: #161b22; border: 1px solid #21262d; padding: 1em; overflow-x: auto; }
        #md code { font-family: monospace; font-size: 13px; }
        #md p code { background: #161b22; padding: .15em .4em; }
        #md blockquote { border-left: 3px solid #3b434b; padding-left: 1em; color: #8b949e; }
        #md table { border-collapse: collapse; width: 100%; }
        #md th, #md td { border: 1px solid #21262d; padding: .4em .8em; text-align: left; font-size: 13px; }
        #md th { background: #161b22; color: #8b949e; }
        #md ul, #md ol { padding-left: 1.5em; }
        #md hr { border: none; border-top: 1px solid #21262d; margin: 2em 0; }
        #src { text-align: right; font-size: 12px; color: #484f58; margin-bottom: 1em; }
        #src a { color: #484f58; }
    </style>
</head>
<body>
    <div id="src">source: <a href="/paysentry/llms-full.txt">llms-full.txt</a></div>
    <div id="md"></div>
    <script>
        fetch('/paysentry/llms-full.txt')
            .then(r => r.text())
            .then(md => { document.getElementById('md').innerHTML = marked.parse(md); })
            .catch(() => { document.getElementById('md').textContent = 'Failed to load. Read the source directly: /paysentry/llms-full.txt'; });
    </script>
</body>
</html>
